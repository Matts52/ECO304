<!DOCTYPE HTML>
<html>

<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-C0CWMV96MD"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-C0CWMV96MD');
  </script>

  <link rel="stylesheet" href="../styles.css">

  <!-- tell broswer not to cache the webpage (hopefully it listens) -->
  <meta http-equiv="cache-control" content="no-cache">

  <!-- Libraries -->
  <script type="text/javascript" src="../Scripts/navbar.js"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>

</head>

<body>

  <div id="navbar-container"></div>

  <div class="hist-card">
    <div class="hist-card-header">
      <h1>Historical Grades</h1>
      <p>Grade distributions from past ECO304 semesters.</p>
    </div>

    <div class="hist-controls">
      <div class="hist-filter">
        <label class="hist-label" for="selectSemester">Semester</label>
        <select class="hist-select" id="selectSemester">
          <option value="All">All Semesters</option>
          <option value="Fall 2022">Fall 2022</option>
          <option value="Winter 2023">Winter 2023</option>
          <option value="Fall 2023">Fall 2023</option>
          <option value="Winter 2024">Winter 2024</option>
          <option value="Fall 2024">Fall 2024</option>
        </select>
      </div>
      <div class="hist-filter">
        <label class="hist-label" for="selectMajor">Major</label>
        <select class="hist-select" id="selectMajor">
          <option value="All">All Majors</option>
          <option value="ACC">Accounting</option>
          <option value="AGEC">Agriculture Economics</option>
          <option value="AGBS">Agri-Business</option>
          <option value="BUEC">Business Economics</option>
          <option value="CE">Civil Engineering</option>
          <option value="CMPT">Computer Science</option>
          <option value="ECON">Economics</option>
          <option value="FDSC">Food Science</option>
          <option value="FIN">Finance</option>
          <option value="STAT">Statistics</option>
          <option value="Undeclared">Undeclared</option>
        </select>
      </div>
    </div>

    <div class="hist-chart-wrap">
      <canvas id="histogramChart"></canvas>
    </div>
  </div>

  <script type="text/javascript" src="HistoricalGrades.js"></script>

</body>
</html>
