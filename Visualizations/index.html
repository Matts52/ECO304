<!DOCTYPE HTML>
<html>

<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-C0CWMV96MD"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-C0CWMV96MD');
  </script>

  <link rel="stylesheet" href="../styles.css">

  <!-- libraries -->
  <script src="https://d3js.org/d3.v4.js"></script>
  <script type="text/javascript" src="../Scripts/StatisticalHelpers.js"></script>
  <script type="text/javascript" src="../Scripts/navbar.js"></script>

  <!-- tell broswer not to cache the webpage (hopefully it listens) -->
  <meta http-equiv="cache-control" content="no-cache">

</head>

<body>

  <div id="navbar-container"></div>

  <h1 class="title">ECO304 Visualizations</h1>
  <hr class="style-eight visualize">

  <!-- Central Limit Theorem -->
  <div class="viz-card">
    <div class="viz-card-header">
      <span class="viz-number">1</span>
      <h2>Central Limit Theorem</h2>
    </div>
    <p id="CLTText" class="viz-description"></p>
    <div class="viz-table-wrap">
      <table class="question" id="CLTTable"></table>
    </div>
    <div class="viz-controls">
      <label class="viz-label" for="numSamples">Sample means to generate</label>
      <input class="viz-input" type="number" id="numSamples" placeholder="e.g. 100">
      <input class="button-68" type="button" id="genCLT" value="Generate">
      <input class="button-68 button-secondary" type="button" id="resetCLT" value="Reset">
    </div>
    <div id="clt_dataviz" class="viz-chart"></div>
  </div>

  <!-- Law of Large Numbers -->
  <div class="viz-card">
    <div class="viz-card-header">
      <span class="viz-number">2</span>
      <h2>Law of Large Numbers</h2>
    </div>
    <p id="LLNText" class="viz-description"></p>
    <div class="viz-table-wrap">
      <table class="question" id="LLNTable"></table>
    </div>
    <div class="viz-controls">
      <label class="viz-label" for="numLLNSamps">Sample means to generate</label>
      <input class="viz-input" type="number" id="numLLNSamps" placeholder="e.g. 100">
      <input class="button-68" type="button" id="genLLN" value="Play Animation">
    </div>
    <div id="lln_dataviz" class="viz-chart"></div>
  </div>

  <!-- t-Distribution Degrees of Freedom -->
  <div class="viz-card">
    <div class="viz-card-header">
      <span class="viz-number">3</span>
      <h2>Degrees of Freedom in the t-Distribution</h2>
    </div>
    <p id="DFTText" class="viz-description"></p>
    <div class="viz-controls">
      <input class="button-68" type="button" id="genDFT" value="Play Animation">
    </div>
    <p id="DegFreeText" class="viz-stat-badge"></p>
    <div id="dft_dataviz" class="viz-chart"></div>
  </div>

  <!-- Linear Regression -->
  <div class="viz-card">
    <div class="viz-card-header">
      <span class="viz-number">4</span>
      <h2>Linear Regression</h2>
    </div>
    <p id="RegText" class="viz-description"></p>
    <div class="viz-controls">
      <input class="button-68" type="button" id="genREG" value="Play Animation">
    </div>
    <p id="RegFreeText" class="viz-stat-badge"></p>
    <div id="reg_dataviz" class="viz-chart"></div>
  </div>

  <p class="disclaimer">Note: Small bugs may be present. Bug fixes are encouraged in the <a
      href="https://github.com/Matts52/ECO304">Github repository!</a></p>

  <!-- scripts -->
  <script type="text/javascript" src="Visualizations.js"></script>

</body>
</html>
