<!DOCTYPE HTML>
<html>

<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-C0CWMV96MD"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-C0CWMV96MD');
  </script>

  <link rel="stylesheet" href="../styles.css">

  <!-- tell broswer not to cache the webpage (hopefully it listens) -->
  <meta http-equiv="cache-control" content="no-cache">

  <!-- Libraries -->
  <script type="text/javascript" src="../Scripts/navbar.js"></script>

</head>

<body>

  <div id="navbar-container"></div>

  <div class="grade-card">
    <div class="grade-card-header">
      <h1>Grade Calculator</h1>
      <p>Enter your scores below to estimate your final grade.</p>
    </div>

    <table class="gradetable">
      <thead>
        <tr>
          <th>Component</th>
          <th>Score (out of 100%)</th>
        </tr>
      </thead>
      <tbody>
        <tr class="table-section"><td colspan="2">Assignments</td></tr>
        <tr><td>A1</td><td><input type="number" id="A1Grade"></td></tr>
        <tr><td>A2</td><td><input type="number" id="A2Grade"></td></tr>
        <tr><td>A3</td><td><input type="number" id="A3Grade"></td></tr>
        <tr><td>A4</td><td><input type="number" id="A4Grade"></td></tr>
        <tr><td>A5</td><td><input type="number" id="A5Grade"></td></tr>
        <tr><td>A6</td><td><input type="number" id="A6Grade"></td></tr>
        <tr class="table-section"><td colspan="2">Labs</td></tr>
        <tr><td>L1</td><td><input type="number" id="L1Grade"></td></tr>
        <tr><td>L2</td><td><input type="number" id="L2Grade"></td></tr>
        <tr><td>L3</td><td><input type="number" id="L3Grade"></td></tr>
        <tr class="table-section"><td colspan="2">Lab Project</td></tr>
        <tr><td>Lab Project</td><td><input type="number" id="LPGrade"></td></tr>
        <tr class="table-section"><td colspan="2">Exams</td></tr>
        <tr><td>Midterm 1</td><td><input type="number" id="M1Grade"></td></tr>
        <tr><td>Midterm 2</td><td><input type="number" id="M2Grade"></td></tr>
        <tr><td>Final</td><td><input type="number" id="FGrade"></td></tr>
      </tbody>
    </table>

    <div class="grade-card-footer">
      <input class="button-68" type="button" id="calcGrade" value="Calculate Grade">
      <p id="gradecalc_curr" class="grade-result"></p>
      <p class="disclaimer">Calculations are subject to round-off error and are for gauging purposes only.</p>
    </div>
  </div>

  <script type="text/javascript" src="GradeCalculate.js"></script>

</body>
</html>
